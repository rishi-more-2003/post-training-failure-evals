name: tests

on:
  push:
    branches: master
  pull_request:
    branches: master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Optional: uncomment to pull CPU-only torch and keep CI fast/light
          # pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
          pip install pytest

      - name: Run offline test suite
        run: pytest -q
